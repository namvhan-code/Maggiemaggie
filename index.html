<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAGGIE MAGIE Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background: linear-gradient(135deg, #FFF6F0 0%, #D5E8F8 100%); min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.8); }
        .virtual-card { transition: all 0.3s ease; }
        .virtual-card:hover { transform: translateY(-4px); }
        @keyframes dash-animation { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -24; } }
        .animate-dash { animation: dash-animation 1s linear infinite; }
    </style>
</head>
<body class="flex flex-col items-center py-10 px-4 text-[#89A8B2]">

    <div class="max-w-[420px] w-full space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-[#89A8B2]">MAGGIE MAGIE</h1>
            <p class="text-sm font-medium text-[#C3DDEC]">Payment & Checkout</p>
        </div>

        <div class="glass-card rounded-[40px] p-4 shadow-xl">
            <div class="relative p-2 rounded-[36px]">
                <svg class="absolute inset-0 w-full h-full pointer-events-none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="calc(100% - 4px)" height="calc(100% - 4px)" rx="34" fill="none" stroke="#C3DDEC" stroke-width="2.5" stroke-dasharray="12 12" class="animate-dash" />
                </svg>
                <div class="rounded-[28px] overflow-hidden border-[4px] border-white">
                    <img src="https://i.postimg.cc/1359v3nC/att.IskJBp36lCO1naoMJ-Rkmn7PZBzZe3VDbCgDae17ZF8.jpeg" alt="Payment" class="w-full h-auto object-cover">
                </div>
            </div>

            <div class="p-4 space-y-4">
                <p class="text-center text-sm font-medium">♾ 𝘗𝘢𝘺𝘮𝘦𝘯𝘵 𝘋𝘦𝘵𝘢𝘪𝘭𝘴 🫶🏻</p>
                
                <div class="virtual-card bg-[#C3DDEC] rounded-[24px] p-5 cursor-pointer" onclick="copyText('0968627749')">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-white font-bold text-sm">Wallet</span>
                        <span class="text-white text-xs bg-white/20 px-3 py-1 rounded-full">คัดลอก</span>
                    </div>
                    <div class="text-white font-bold text-xl tracking-wider">096-862-7749</div>
                    <div class="text-white/80 text-xs">เมธาวี รัตนภาค</div>
                </div>

                <div class="virtual-card bg-[#D5E8F8] rounded-[24px] p-5 cursor-pointer border border-white" onclick="copyText('1731262876')">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[#89A8B2] font-bold text-sm">K Plus</span>
                        <span class="text-[#89A8B2] text-xs bg-white/50 px-3 py-1 rounded-full">คัดลอก</span>
                    </div>
                    <div class="text-[#89A8B2] font-bold text-xl tracking-wider">173-1-26287-6</div>
                    <div class="text-[#89A8B2]/80 text-xs">เมธาวี รัตนภาค</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 bg-[#89A8B2] text-white px-6 py-3 rounded-full shadow-lg opacity-0 transition-opacity duration-300">
        คัดลอกเลขบัญชีแล้ว!
    </div>

    <script>
        function copyText(text) {
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => { toast.style.opacity = '0'; }, 2000);
        }
    </script>
</body>
</html>
